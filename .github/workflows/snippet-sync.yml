name: Snippet Sync

on:
  push:
    branches: [main]
    paths:
      - 'snippets/**'
      - 'plugins/guild-tavern/skills/**/ENV.md'
      - 'tests/test_snippet_sync.py'
  pull_request:
    paths:
      - 'snippets/**'
      - 'plugins/guild-tavern/skills/**/ENV.md'
      - 'tests/test_snippet_sync.py'
  workflow_dispatch:

jobs:
  snippet-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv run pytest tests/test_snippet_sync.py -v
